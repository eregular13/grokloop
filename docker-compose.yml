# GrokLoop — safe-by-default local agent stack
# Usage:  docker compose up --build -d
# Operator mode (docker socket + project write):
#         docker compose -f docker-compose.yml -f docker-compose.operator.yml up -d

name: localgrokloop

x-agent-env: &agent-env
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
  OLLAMA_PLANNER_MODEL: ${OLLAMA_PLANNER_MODEL:-}
  CHROMA_HOST: chromadb
  CHROMA_PORT: "8000"
  SEARXNG_URL: http://searxng:8080
  REDIS_URL: redis://redis:6379/0
  WORKSPACE_PATH: /workspace
  TASKS_PATH: /tasks
  DATA_PATH: /data
  HUMAN_INBOX: /human_inbox
  HUMAN_OUTBOX: /human_outbox
  LOOP_SLEEP_SECONDS: ${LOOP_SLEEP_SECONDS:-30}
  HEARTBEAT_SECONDS: ${HEARTBEAT_SECONDS:-60}
  MAX_ITERATIONS_PER_GOAL: ${MAX_ITERATIONS_PER_GOAL:-50}
  MAX_GOAL_ELAPSED_SECONDS: ${MAX_GOAL_ELAPSED_SECONDS:-3600}
  MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-5}
  SELF_EDIT_MODE: ${SELF_EDIT_MODE:-false}
  ENABLE_DOCKER_TOOL: ${ENABLE_DOCKER_TOOL:-false}
  AGENT_MODE: ${AGENT_MODE:-edit}
  SEED_DEFAULT_GOAL: ${SEED_DEFAULT_GOAL:-false}
  TOOL_TIMEOUT_SECONDS: ${TOOL_TIMEOUT_SECONDS:-120}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  chromadb:
    image: chromadb/chroma:1.0.15
    restart: unless-stopped
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "127.0.0.1:8100:8000"
    networks:
      - loopnet
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - loopnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:2025.5.12-7ca24eee8
    restart: unless-stopped
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:8888/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-in-env}
    ports:
      - "127.0.0.1:8888:8080"
    networks:
      - loopnet
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *agent-env
    volumes:
      - ./workspace:/workspace
      - ./tasks:/tasks
      - ./data:/data
      - ./human_inbox:/human_inbox
      - ./human_outbox:/human_outbox
      # NO project root mount and NO docker.sock in safe default mode
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - loopnet

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      DATA_PATH: /data
      TASKS_PATH: /tasks
      HUMAN_INBOX: /human_inbox
      HUMAN_OUTBOX: /human_outbox
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
    volumes:
      - ./data:/data:ro
      - ./tasks:/tasks
      - ./human_inbox:/human_inbox
      - ./human_outbox:/human_outbox
      - ./workspace:/workspace:ro
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      - redis
      - agent
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - loopnet

networks:
  loopnet:
    driver: bridge