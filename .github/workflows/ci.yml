name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            agent/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check agent dashboard tests examples

      - name: Compile check
        run: python -m compileall agent dashboard

      - name: Unit tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: agent:dashboard

      - name: Dependency audit (advisory)
        run: |
          echo "::notice::Dependency audit is advisory — failures do not block CI"
          pip install pip-audit && pip-audit -r agent/requirements.txt || true

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet