name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt pytest

      - name: Compile check
        run: python -m compileall agent

      - name: Unit tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: agent

      - name: Dependency audit
        run: pip install pip-audit && pip-audit -r agent/requirements.txt || true

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate docker-compose.yml
        run: docker compose config --quiet